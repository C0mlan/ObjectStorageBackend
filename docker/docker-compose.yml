name: objectstorage
services:

  postgres:
    image: postgres:15
    container_name: objectstorage_postgres
    environment:
      POSTGRES_DB:  object_storage_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: objectstorage_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    working_dir: /app
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: objectstorage_app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/object_storage_backend
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      HOME: /tmp
      MAVEN_OPTS: -Dmaven.repo.local=/tmp/m2-repo
    depends_on:
      - postgres
      - redis
    ports:
      - "7088:7088"

volumes:
  postgres_data: