name: Object Storage Backend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    # -----------------------------
    # External services required for integration tests
    # -----------------------------
    services:

      # PostgreSQL database for Spring Data JPA + integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: object_storage_backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Redis service for caching, sessions, queues, etc.
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # -----------------------------
    # Environment variables available to Spring Boot tests
    # -----------------------------
    env:
      SPRING_PROFILES_ACTIVE: test

      # Database connection for Spring datasource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/object_storage_backend
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password

      # Redis connection settings
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379


    steps:

      # -----------------------------
      # Pull repository source code into CI runner
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install and configure Java (JDK 17)
      # Uses Temurin distribution with Maven caching enabled
      # -----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # ----------------------------- 
      # Run full Maven lifecycle
      # Includes:
      # - Unit tests (Surefire)
      # - Integration tests (Failsafe)
      # - Flyway validation via Spring Boot startup
      # - Coverage checks (JaCoCo)
      # -----------------------------
      - name: Run full test pipeline (unit + integration + coverage)
        run: ./mvnw clean verify

      # -----------------------------
      # Upload unit test reports (Surefire)
      # -----------------------------
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # -----------------------------
      # Upload integration test reports (Failsafe)
      # -----------------------------
      - name: Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/

      # -----------------------------
      # Upload code coverage report (JaCoCo HTML report)
      # -----------------------------
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/